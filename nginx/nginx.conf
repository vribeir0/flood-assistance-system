# Zone principal: 30 req/min por IP
limit_req_zone $binary_remote_addr zone=chat:10m rate=30r/m;

# Zone de penalidade: 1 req/hora por IP — ativada quando excede o burst
# IPs que ultrapassam o limite caem aqui e ficam bloqueados por ~1 hora
limit_req_zone $binary_remote_addr zone=penalty:10m rate=1r/m;

# Retorna 429 ao invés do padrão 503
limit_req_status 429;

server {
    listen 80;

    # Frontend — arquivos estáticos do Expo Web (SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # Redireciona rotas SPA para o index.html
        try_files $uri $uri/ /index.html;
    }

    # Backend — Socket.IO (WebSocket + long-polling)
    location /socket.io/ {
        # Limite normal: 30r/m com burst de 10
        limit_req zone=chat burst=10 nodelay;
        # Penalidade: quem excede o burst entra nesta zone
        # Como rate=1r/m e sem burst, precisa esperar ~60min para acumular crédito
        limit_req zone=penalty burst=0 nodelay;

        proxy_pass http://app:5000;
        proxy_http_version 1.1;

        # Necessário para upgrade WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Repassa o IP real do cliente para o Flask
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
    }
}

