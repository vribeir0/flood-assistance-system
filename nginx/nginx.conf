# ── Cloudflare: restaurar IP real do cliente ──────────────────────
# Sem isso, $binary_remote_addr é o IP do Cloudflare e todo mundo
# compartilha o mesmo bucket de rate limit.
# Lista oficial: https://www.cloudflare.com/ips/
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
# IPv6
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# ── Rate limiting ─────────────────────────────────────────────────
# Agora $binary_remote_addr é o IP real do cliente (via CF-Connecting-IP)
limit_req_zone $binary_remote_addr zone=chat:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=penalty:10m rate=1r/m;
limit_req_status 429;

server {
    listen 80;

    # ── Rejeitar tráfego que não veio pelo Cloudflare ─────────────
    # Se alguém acessar direto pelo IP, não terá o header CF-Connecting-IP
    # Em produção, considere usar firewall (ufw/iptables) para bloquear
    # portas 80/443 de IPs que não sejam do Cloudflare.

    # ── Headers de segurança ──────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Frontend — arquivos estáticos do Expo Web (SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend — Socket.IO (WebSocket + long-polling)
    location /socket.io/ {
        limit_req zone=chat burst=10 nodelay;
        limit_req zone=penalty nodelay;

        proxy_pass http://app:5000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Host $host;
    }
}

