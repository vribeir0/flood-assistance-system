# ── Cloudflare: restaurar IP real do cliente ──────────────────────
# Sem isso, $binary_remote_addr é o IP do Cloudflare e todo mundo
# compartilha o mesmo bucket de rate limit.
# Lista oficial: https://www.cloudflare.com/ips/
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
# IPv6
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;


map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Rate limiting ─────────────────────────────────────────────────
# 30 requisições/minuto com burst de 10 por IP
limit_req_zone $binary_remote_addr zone=chat:10m rate=30r/m;
limit_req_status 429;

# ── Redireciona HTTP → HTTPS ─────────────────────────────────────
server {
    listen 80;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;

    ssl_certificate     /etc/ssl/cloudflare/cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Bloqueia o acesso direto via IP sem passar pelo Cloudflare

    if ($http_cf_connecting_ip = "") {
        return 444;
    }

    # ── Headers de segurança ──────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Permissions-Policy (Chrome/Firefox/Edge) + Feature-Policy legado (Safari < 16)
    add_header Permissions-Policy "geolocation=(self)" always;
    # CSP: permite scripts e frames do Cloudflare Turnstile
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss: https:;" always;

    # Frontend — arquivos estáticos do Expo Web (SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend — verificação do Captcha
    location /verify-captcha {
        limit_req zone=chat burst=5 nodelay;

        proxy_pass http://app:5000;
        proxy_http_version 1.1;

        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Host $host;
    }

    # Backend — Socket.IO (WebSocket + long-polling)
    location /socket.io/ {
        limit_req zone=chat burst=10 nodelay;

        proxy_pass http://app:5000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Host $host;
    }
}

