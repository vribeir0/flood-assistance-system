# Limite de requisições: 5 por minuto por IP
limit_req_zone $binary_remote_addr zone=chat:10m rate=5r/m;

server {
    listen 80;

    location /socket.io/ {
        limit_req zone=chat burst=3 nodelay;

        proxy_pass http://app:5000;
        proxy_http_version 1.1;

        # Necessário para upgrade WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Repassa o IP real do cliente para o Flask
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
    }

    # Demais rotas HTTP
    location / {
        proxy_pass http://app:5000;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
    }
}
