# Este arquivo é carregado automaticamente pelo Docker Compose em desenvolvimento.
# Para produção, use: docker compose -f docker-compose.yml up
services:
  app:
    env_file: .env.dev
    environment:
      FLASK_ENV: development
    ports:
      - "5000:5000"
    command: ["uv", "run", "python", "app.py"]
    develop:
      watch:
        # Sincroniza arquivos .py e reinicia o container ao salvar
        - action: sync+restart
          path: ./backend
          target: /app
          ignore:
            - __pycache__/
            - "**/__pycache__/"
        # Reconstrói a imagem se as dependências mudarem
        - action: rebuild
          path: ./backend/pyproject.toml

  frontend:
    image: node:20-alpine
    working_dir: /frontend
    volumes:
      - ./frontend:/frontend
      - frontend_node_modules:/frontend/node_modules
    environment:
      - EXPO_PUBLIC_API_URL=http://localhost
      - EXPO_PUBLIC_ENV=development
    command: sh -c "npm install && npx expo start --web --port 8081 --host lan"
    ports:
      - "8081:8081"
    develop:
      watch:
        - action: rebuild
          path: ./frontend/package.json

  # Em desenvolvimento o Nginx faz proxy do frontend dev server + backend
  nginx:
    build: !reset null
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - frontend
    develop:
      watch:
        - action: sync+restart
          path: ./nginx/nginx.dev.conf
          target: /etc/nginx/conf.d/default.conf

volumes:
  frontend_node_modules:
