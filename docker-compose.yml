services:
  app:
    build: ./backend
    env_file: .env
    environment:
      FLASK_ENV: production
    restart: unless-stopped
    # Porta 5000 não é exposta diretamente — só o Nginx é público
    expose:
      - "5000"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - app
    restart: unless-stopped
