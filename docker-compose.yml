services:
  app:
    build: ./backend
    env_file: .env.prod
    restart: unless-stopped
    # Porta 5000 não é exposta diretamente — só o Nginx é público
    expose:
      - "5000"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        EXPO_PUBLIC_TURNSTILE_SITE_KEY: ${EXPO_PUBLIC_TURNSTILE_SITE_KEY:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/cert.pem:/etc/ssl/cloudflare/cert.pem:ro
      - ./nginx/key.pem:/etc/ssl/cloudflare/key.pem:ro
    depends_on:
      - app
    restart: unless-stopped
