services:
  app:
    build: .
    env_file: .env
    environment:
      FLASK_ENV: production
    restart: unless-stopped
    # Porta 5000 não é exposta diretamente — só o Nginx é público
    expose:
      - "5000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
